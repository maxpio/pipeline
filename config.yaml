# Configuration for the Lagrangian Multiplier GNN training script

# --- Paths ---
# Paths are relative to the project's base directory
paths:
  feature_dir: "data/GA/featureinf"
  lp_dir: "data/GA/lpfiles"
  labels_path: "data/GA/labels/labels.json"
  weights_path: "/home/max/master_ths/weights/gaptest.pth"
  results_path: "results.json"
  plot_path: "training_loss_plot1.png"
  gcg_executable: "/home/max/gcg/build/gcg-linux-release/bin/gcg"
  log_dir: "logs"
  duals_dir: "predicted_duals"

# --- Model Architecture ---
model_architecture:
  feature_embedding_size: 16
  # The input dimension (4) and final output dimension (feature_embedding_size) are automatically added
  encoder_mlp_dims: [64]
  # The input (2 * feature_embedding_size) and output (feature_embedding_size) dimensions are dynamically added
  gnn_mlp_dims: [128]
  # The input (feature_embedding_size) and output (1) dimensions are dynamically added
  decoder_mlp_dims: [64]
  num_layers: 2
  dropout: 0.4

# --- Training Parameters ---
training_parameters:
  load_pretrained: True
  learning_rate: 1e-5
  epochs: 100000
  train_ratio: 0.9
  val_ratio: 0.1
  use_random_subset: False
  random_subset_ratio: 0.3
  random_seed: 31343564334843643257234978
  plot_every_n_epochs: 1
  evaluate_validation_loss: True
  evaluate_validation_every_n_epochs: 25
  plot_min_gap_closed: 65.0
  use_gradient_clipping: True
  gradient_clipping_max_norm: 80.0
  use_lr_scheduler: False
  lr_scheduler_factor: 0.5 # multiplicative factor applied to the learning rate when patience runs out
  lr_scheduler_patience: 15 #  number of epochs the scheduler will wait for the loss to improve before it reduces the learning rate
  is_minimization: True # Whether the goal is to minimize (True) or maximize (False) the validation metric

# --- Parallelization & Batching ---
parallelization_batching:
  num_cores: 5
  batch_size: 40

# --- Caching Settings ---
caching_settings:
  cache_graph: True
  cache_lp_files: False

# --- SCIP Settings ---
scip_settings:
  disable_presolve: False
  disable_heuristics: False
  mip_gap: 0.2
  feature_extraction_presolving_maxrounds: 0

# --- Pipeline Settings ---
pipeline_settings:
  timeout: 3600
  lp_dir: "/home/max/master_ths/data/GAPD/lpfiles"
  dec_dir: "/home/max/master_ths/data/GAPD/decfiles"
  duals_dir: "/home/max/master_ths/data/GA/predicted_duals"
  duals_dir_read: "/home/max/master_ths/data/GAPD/dualvalues"
  log_dir: "/home/max/master_ths/data/GAPD/logs"
  experiments_dir: "/home/max/master_ths/data/GAPD/experiments"
  experiment_json_name: "default.json"
  skip_prediction: True
  instance_ratio: 1.0  # Ratio (0.0–1.0) of instances from lp_dir to process (randomly sampled)
  required_instances: []  # List of filenames (e.g. ["e10100-1.lp"]) always included, even if ratio is 0
  required_prefix: ""  # Instances with this prefix are always included
  random_seed: 42  # Seed for reproducible random sampling of instances
  num_cores: 4  # CPU cores for parallel feature extraction and GCG solving
  gpu_batch_size: 50  # Number of instances to predict duals for in one GPU batch

# --- GCG Settings (Pricing Plugin) ---
gcg_settings:
  disable_heuristics: False
  disable_presolving: False
  disable_separating_cliques: False
  solve_root_only: True
  use_custom_duals: "False"
  use_bigm_artificials: "False"
  n_perturbation_rounds: 0
  perturbation_percent: 0.1
  add_round_0_columns: "True"
  bigm_value: 1000000.0
  large_log: "True"
  use_smoothing: "True"
  smoothing_weight_start: 0.99
  smoothing_weight_factor: 0.4
  smoothing_weight_min: 0.01
  smoothing_improvement_threshold: 200.0
  disable_subprob_presolve_heur: "False"
  masterpricer_stabilization: "True"

# --- Visualization Settings ---
visualization_settings:
  experiment_files:
    - "default.json"
    - "raw.json"
    - "optD.json"
    - "optDInitCol.json"
    - "predict.json"
    - "usePredicted.json"
    - "subopt99.json"
    - "randD.json"

    # add other .json filenames here to compare them

# --- Duals Generation Settings ---
duals_generation_settings:
  lp_dir: "/home/max/master_ths/data/GAPD/lpfiles"
  results_file: "/home/max/master_ths/data/GAPD/results.json"
  prefix_filter: "e10100"
  generate_subopt: True
  subopt_percent: 0.99
  generate_random: True
  random_gauss_mu: 0.0
  random_gauss_sigma: 5.0
  multicore_solving: True
  max_workers: 4
  short_log_output: True
  max_iters: 500
  initial_step_size: 4.0
  no_improve_limit: 4
  step_size_shrink: 0.5
  tolerance: 1.0e-6